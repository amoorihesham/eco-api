services:
  db:
    image: postgres:18-alpine
    container_name: eco-api-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecopass}
      POSTGRES_DB: ${POSTGRES_DB:-eco}
    ports:
      - "5432:5432"
    volumes:
      - eco-pgdata:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-eco} -d ${POSTGRES_DB:-eco}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  eco-pgdata:
    name: eco-pgdata
