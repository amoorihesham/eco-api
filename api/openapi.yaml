openapi: 3.0.3

info:
  title: eco-api — Multi-vendor B2C Marketplace API
  version: 1.0.0
  description: |
    HTTP contract for the `eco-api` marketplace MVP (headless, API-first).

    This specification is the source of truth for the API surface and is used for documentation
    (Swagger UI) and request/response validation. Handlers are hand-written.

    **Scope:** all MVP "Must" capabilities from the PRD. Stretch features (product reviews,
    notification preferences) are intentionally **out of scope** for this version.

    **Conventions**
    - Monetary amounts are integers in **minor units** (e.g. cents) accompanied by a `currency` code.
    - Collection endpoints are paginated with `page` / `page_size` and return a `pagination` object.
    - Errors use a single envelope: `{ "error": { "code", "message", "details" } }`.
    - All endpoints require a Bearer JWT unless explicitly marked public (`security: []`).
  contact:
    name: eco-api
    email: amrheshammacc@gmail.com
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://staging.eco-api.example/api/v1
    description: Staging

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: Registration, login, token refresh, password reset.
  - name: Account
    description: Current user's profile and shipping-address book.
  - name: Seller
    description: Seller application and store profile.
  - name: Categories
    description: Public category listing; admin-managed category catalog.
  - name: Discovery
    description: Public product browsing, filtering, search, and detail.
  - name: Products
    description: Seller product, variant, and image management; admin moderation.
  - name: Cart
    description: Buyer's variant-aware shopping cart.
  - name: Orders
    description: Checkout, buyer order history, and order actions.
  - name: Orders (Seller)
    description: Seller sub-order fulfilment.
  - name: Payments
    description: Payment provider webhooks.
  - name: Reports
    description: Seller-scoped report metrics.
  - name: Admin
    description: Platform operator oversight and seller lifecycle.
  - name: System
    description: Liveness and readiness probes.

paths:
  # ---------------------------------------------------------------------------
  # Authentication
  # ---------------------------------------------------------------------------
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new buyer account
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }

  /auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate and obtain tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Exchange a refresh token for a new access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: New tokens issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Invalidate the current refresh token
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '204': { description: Logged out. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/password/forgot:
    post:
      tags: [Authentication]
      summary: Request a password-reset token
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
      responses:
        '202':
          description: If the email exists, a reset token has been sent (always returns 202).
        '400': { $ref: '#/components/responses/ValidationError' }

  /auth/password/reset:
    post:
      tags: [Authentication]
      summary: Reset the password using a reset token
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '204': { description: Password updated. }
        '400': { $ref: '#/components/responses/ValidationError' }

  # ---------------------------------------------------------------------------
  # Account
  # ---------------------------------------------------------------------------
  /me:
    get:
      tags: [Account]
      summary: Get the current user's profile
      operationId: getMe
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Account]
      summary: Update the current user's profile
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserInput' }
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/addresses:
    get:
      tags: [Account]
      summary: List the current user's shipping addresses
      operationId: listAddresses
      responses:
        '200':
          description: Address list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Address' }
                required: [data]
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Account]
      summary: Add a shipping address
      operationId: createAddress
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressInput' }
      responses:
        '201':
          description: Address created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/addresses/{addressId}:
    parameters:
      - $ref: '#/components/parameters/AddressId'
    get:
      tags: [Account]
      summary: Get a shipping address
      operationId: getAddress
      responses:
        '200':
          description: Address.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Account]
      summary: Update a shipping address
      operationId: updateAddress
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressInput' }
      responses:
        '200':
          description: Updated address.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Account]
      summary: Delete a shipping address
      operationId: deleteAddress
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------------
  # Seller
  # ---------------------------------------------------------------------------
  /seller/applications:
    post:
      tags: [Seller]
      summary: Apply to become a seller
      operationId: applyForSeller
      description: A buyer submits a single active application. Sets status `pending` (PRD FR-5).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SellerApplicationInput' }
      responses:
        '201':
          description: Application submitted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerApplication' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: An application already exists or the user is already a seller.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /seller/application:
    get:
      tags: [Seller]
      summary: Get the current user's seller application status
      operationId: getMySellerApplication
      responses:
        '200':
          description: Application.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerApplication' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /seller/store:
    get:
      tags: [Seller]
      summary: Get the current seller's store profile
      operationId: getMyStore
      responses:
        '200':
          description: Store profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Store' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Seller]
      summary: Update the current seller's store profile
      operationId: updateMyStore
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreInput' }
      responses:
        '200':
          description: Updated store.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Store' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------------
  # Categories
  # ---------------------------------------------------------------------------
  /categories:
    get:
      tags: [Categories]
      summary: List categories
      operationId: listCategories
      security: []
      responses:
        '200':
          description: Category list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
                required: [data]
    post:
      tags: [Categories]
      summary: Create a category (admin)
      operationId: createCategory
      description: Requires the `admin` role (PRD FR-41).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '201':
          description: Category created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /categories/{categoryId}:
    parameters:
      - $ref: '#/components/parameters/CategoryId'
    patch:
      tags: [Categories]
      summary: Update a category (admin)
      operationId: updateCategory
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CategoryInput' }
      responses:
        '200':
          description: Updated category.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Category' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Categories]
      summary: Retire a category (admin)
      operationId: deleteCategory
      description: Retiring a category must not orphan products; affected products are flagged for re-categorization (PRD FR-41).
      responses:
        '204': { description: Retired. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------------
  # Discovery (public)
  # ---------------------------------------------------------------------------
  /products:
    get:
      tags: [Discovery]
      summary: Browse and search products
      operationId: listProducts
      security: []
      description: Returns only discoverable products (active, approved & non-suspended seller) — PRD FR-19–FR-21.
      parameters:
        - { name: q, in: query, description: Keyword search over title and description., schema: { type: string } }
        - { name: category_id, in: query, schema: { type: string, format: uuid } }
        - { name: seller_id, in: query, schema: { type: string, format: uuid } }
        - { name: color, in: query, schema: { type: string } }
        - { name: size, in: query, schema: { type: string } }
        - { name: price_min_minor, in: query, schema: { type: integer, format: int64, minimum: 0 } }
        - { name: price_max_minor, in: query, schema: { type: integer, format: int64, minimum: 0 } }
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc]
            default: newest
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated product list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProductListItem' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
                required: [data, pagination]
        '400': { $ref: '#/components/responses/ValidationError' }
    post:
      tags: [Products]
      summary: Create a product (seller)
      operationId: createProduct
      description: |
        Available only to an `approved` seller (PRD FR-7). A product may have 0, 1, or 2 variant axes
        (color, size). When variant-less, the product carries `stock` and `base_price_minor`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: Product created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Discovery]
      summary: Get product detail
      operationId: getProduct
      security: []
      description: Public product detail including variants, availability, and seller info (PRD FR-22).
      responses:
        '200':
          description: Product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Products]
      summary: Update a product (seller, owner)
      operationId: updateProduct
      description: Sellers may update only their own products, including `status` (draft/active/inactive) — PRD FR-15.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200':
          description: Updated product.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Products]
      summary: Delete a product (seller, owner)
      operationId: deleteProduct
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------------
  # Products (seller management)
  # ---------------------------------------------------------------------------
  /products/{productId}/variants:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    post:
      tags: [Products]
      summary: Add a variant to a product (seller, owner)
      operationId: createVariant
      description: Each variant defines its own SKU, price, and stock on up to two axes (color, size) — PRD FR-12/FR-13.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantInput' }
      responses:
        '201':
          description: Variant created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Variant' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{productId}/variants/{variantId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/VariantId'
    patch:
      tags: [Products]
      summary: Update a variant (seller, owner)
      operationId: updateVariant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VariantInput' }
      responses:
        '200':
          description: Updated variant.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Variant' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Products]
      summary: Delete a variant (seller, owner)
      operationId: deleteVariant
      responses:
        '204': { description: Deleted. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{productId}/images:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    post:
      tags: [Products]
      summary: Upload a product image (seller, owner)
      operationId: uploadProductImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                position:
                  type: integer
                  minimum: 0
              required: [file]
      responses:
        '201':
          description: Image uploaded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductImage' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{productId}/unpublish:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    post:
      tags: [Products]
      summary: Unpublish a product (admin moderation)
      operationId: unpublishProduct
      description: Admin-only takedown that immediately removes the product from discovery (PRD FR-42).
      responses:
        '200':
          description: Product unpublished.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------------
  # Cart
  # ---------------------------------------------------------------------------
  /cart:
    get:
      tags: [Cart]
      summary: Get the current buyer's cart
      operationId: getCart
      responses:
        '200':
          description: Cart.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [Cart]
      summary: Clear the cart
      operationId: clearCart
      responses:
        '204': { description: Cart cleared. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /cart/items:
    post:
      tags: [Cart]
      summary: Add an item to the cart
      operationId: addCartItem
      description: References a specific sellable unit (a `variant_id` when the product has variants) — PRD FR-24.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddCartItemInput' }
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Requested quantity exceeds available stock.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /cart/items/{itemId}:
    parameters:
      - $ref: '#/components/parameters/CartItemId'
    patch:
      tags: [Cart]
      summary: Update a cart item quantity
      operationId: updateCartItem
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCartItemInput' }
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Cart]
      summary: Remove a cart item
      operationId: removeCartItem
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------------------------------------------------------------------------
  # Orders (buyer)
  # ---------------------------------------------------------------------------
  /checkout:
    post:
      tags: [Orders]
      summary: Check out the cart and create an order
      operationId: checkout
      description: |
        Creates one order with **one sub-order per distinct seller** (PRD FR-25) in `pending_payment`,
        and returns a Stripe PaymentIntent `client_secret` for the buyer to confirm payment client-side.
        Stock is decremented only after payment succeeds (PRD FR-17/FR-28), confirmed via the Stripe webhook.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckoutRequest' }
      responses:
        '201':
          description: Order created; awaiting payment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckoutResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Cart empty, or an item is out of stock / no longer available.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders:
    get:
      tags: [Orders]
      summary: List the current buyer's orders
      operationId: listMyOrders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated order list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
                required: [data, pagination]
        '401': { $ref: '#/components/responses/Unauthorized' }

  /orders/{orderId}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [Orders]
      summary: Get an order (buyer, owner)
      operationId: getOrder
      responses:
        '200':
          description: Order.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /orders/{orderId}/cancel:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      summary: Cancel an order (buyer)
      operationId: cancelOrder
      description: Allowed only before any sub-order is shipped (PRD FR-36).
      responses:
        '200':
          description: Order cancelled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Order can no longer be cancelled (already shipped).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/{orderId}/payments:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      summary: Re-initiate payment for an unpaid order
      operationId: createOrderPayment
      description: Returns a fresh PaymentIntent `client_secret` for an order still in `pending_payment`.
      responses:
        '201':
          description: Payment intent created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaymentIntentInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Order is not awaiting payment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------------
  # Orders (seller)
  # ---------------------------------------------------------------------------
  /seller/orders:
    get:
      tags: [Orders (Seller)]
      summary: List sub-orders for the current seller's store
      operationId: listSellerOrders
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/SubOrderStatus' }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated sub-order list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SubOrder' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
                required: [data, pagination]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /seller/orders/{suborderId}:
    parameters:
      - $ref: '#/components/parameters/SubOrderId'
    get:
      tags: [Orders (Seller)]
      summary: Get a sub-order (seller, owner)
      operationId: getSellerSubOrder
      responses:
        '200':
          description: Sub-order.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubOrder' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Orders (Seller)]
      summary: Advance fulfilment of a sub-order (seller, owner)
      operationId: updateSellerSubOrder
      description: |
        Advances the sub-order along allowed transitions and records a tracking reference when shipping
        (PRD FR-32–FR-34). Only `processing`, `shipped`, and `delivered` are settable by the seller.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateSubOrderInput' }
      responses:
        '200':
          description: Updated sub-order.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SubOrder' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Illegal status transition.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------------
  # Payments
  # ---------------------------------------------------------------------------
  /webhooks/stripe:
    post:
      tags: [Payments]
      summary: Stripe payment webhook
      operationId: stripeWebhook
      security: []
      description: |
        Receives Stripe events. The signature in the `Stripe-Signature` header is verified before
        processing, and handling is **idempotent** by Stripe event id (PRD FR-29/FR-30). This endpoint
        is the source of truth for payment success — never the client.
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        description: Raw Stripe event payload (opaque to this contract).
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200': { description: Event received. }
        '400':
          description: Invalid signature or payload.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------------------------------------------------------------------------
  # Reports (seller)
  # ---------------------------------------------------------------------------
  /seller/reports/summary:
    get:
      tags: [Reports]
      summary: Seller report summary
      operationId: getSellerReportSummary
      description: |
        Returns total products, total orders, succeeded orders, total sales value, and earnings for the
        current seller (PRD FR-38). An optional date range filters by order date (PRD FR-39).
      parameters:
        - { name: date_from, in: query, schema: { type: string, format: date } }
        - { name: date_to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Report summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerReportSummary' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /seller/reports/orders-by-status:
    get:
      tags: [Reports]
      summary: Seller order counts grouped by status
      operationId: getSellerOrdersByStatus
      parameters:
        - { name: date_from, in: query, schema: { type: string, format: date } }
        - { name: date_to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Counts by status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrdersByStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------------
  # Admin
  # ---------------------------------------------------------------------------
  /admin/seller-applications:
    get:
      tags: [Admin]
      summary: List seller applications
      operationId: listSellerApplications
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/SellerStatus' }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated applications.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SellerApplication' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
                required: [data, pagination]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/sellers:
    get:
      tags: [Admin]
      summary: List sellers
      operationId: listSellers
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/SellerStatus' }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated sellers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SellerApplication' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
                required: [data, pagination]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/sellers/{sellerId}/approve:
    parameters:
      - $ref: '#/components/parameters/SellerId'
    post:
      tags: [Admin]
      summary: Approve a seller
      operationId: approveSeller
      responses:
        '200':
          description: Seller approved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerApplication' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Seller is not in a state that can be approved.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /admin/sellers/{sellerId}/reject:
    parameters:
      - $ref: '#/components/parameters/SellerId'
    post:
      tags: [Admin]
      summary: Reject a seller application
      operationId: rejectSeller
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        '200':
          description: Application rejected.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerApplication' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/sellers/{sellerId}/suspend:
    parameters:
      - $ref: '#/components/parameters/SellerId'
    post:
      tags: [Admin]
      summary: Suspend a seller
      operationId: suspendSeller
      description: Suspended sellers' products are hidden from discovery and they cannot create products (PRD FR-8).
      responses:
        '200':
          description: Seller suspended.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerApplication' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/users:
    get:
      tags: [Admin]
      summary: List users
      operationId: listUsers
      parameters:
        - name: role
          in: query
          schema: { $ref: '#/components/schemas/Role' }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
                required: [data, pagination]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/orders:
    get:
      tags: [Admin]
      summary: List all orders
      operationId: listAllOrders
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/OrderStatus' }
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: Paginated orders.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
                  pagination: { $ref: '#/components/schemas/Pagination' }
                required: [data, pagination]
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/metrics:
    get:
      tags: [Admin]
      summary: Platform metrics
      operationId: getPlatformMetrics
      description: GMV, order counts, and active seller/product counts (PRD FR-43).
      responses:
        '200':
          description: Platform metrics.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformMetrics' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  # ---------------------------------------------------------------------------
  # System
  # ---------------------------------------------------------------------------
  /healthz:
    get:
      tags: [System]
      summary: Liveness probe
      operationId: healthz
      security: []
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

  /readyz:
    get:
      tags: [System]
      summary: Readiness probe
      operationId: readyz
      security: []
      responses:
        '200':
          description: Service and dependencies are ready.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }
        '503':
          description: A dependency is not ready.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Page:
      name: page
      in: query
      description: 1-based page number.
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: page_size
      in: query
      description: Items per page.
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    AddressId:
      name: addressId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CategoryId:
      name: categoryId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProductId:
      name: productId
      in: path
      required: true
      schema: { type: string, format: uuid }
    VariantId:
      name: variantId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CartItemId:
      name: itemId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SubOrderId:
      name: suborderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    SellerId:
      name: sellerId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Authentication is required or the token is invalid.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: The caller lacks permission for this resource.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: The resource does not exist.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: The request conflicts with current state.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: The request failed validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          example:
            error:
              code: validation_error
              message: One or more fields are invalid.
              details:
                - field: email
                  message: must be a valid email address

  schemas:
    # --- Enums ---
    Role:
      type: string
      enum: [buyer, seller, admin]
    SellerStatus:
      type: string
      enum: [pending, approved, rejected, suspended]
    ProductStatus:
      type: string
      enum: [draft, active, inactive]
    OrderStatus:
      type: string
      enum: [pending_payment, paid, completed, cancelled]
    SubOrderStatus:
      type: string
      enum: [pending_payment, paid, processing, shipped, delivered, completed, cancelled]
    PaymentStatus:
      type: string
      enum: [requires_payment, succeeded, failed]
    ErrorCode:
      type: string
      enum: [validation_error, unauthorized, forbidden, not_found, conflict, internal]

    # --- Errors ---
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { $ref: '#/components/schemas/ErrorCode' }
            message: { type: string }
            details:
              type: array
              nullable: true
              items: { $ref: '#/components/schemas/ErrorDetail' }
          required: [code, message]
      required: [error]
    ErrorDetail:
      type: object
      properties:
        field: { type: string }
        message: { type: string }
      required: [message]

    # --- Pagination ---
    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        page_size: { type: integer, example: 20 }
        total: { type: integer, example: 137 }
        total_pages: { type: integer, example: 7 }
      required: [page, page_size, total, total_pages]

    # --- Auth ---
    RegisterRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        name: { type: string, minLength: 1 }
      required: [email, password, name]
    LoginRequest:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
      required: [email, password]
    RefreshRequest:
      type: object
      properties:
        refresh_token: { type: string }
      required: [refresh_token]
    ForgotPasswordRequest:
      type: object
      properties:
        email: { type: string, format: email }
      required: [email]
    ResetPasswordRequest:
      type: object
      properties:
        token: { type: string }
        new_password: { type: string, format: password, minLength: 8 }
      required: [token, new_password]
    AuthTokens:
      type: object
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, example: bearer }
        expires_in: { type: integer, description: Access-token lifetime in seconds., example: 900 }
      required: [access_token, refresh_token, token_type, expires_in]
    AuthResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        tokens: { $ref: '#/components/schemas/AuthTokens' }
      required: [user, tokens]

    # --- Account ---
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        created_at: { type: string, format: date-time }
      required: [id, email, name, role, created_at]
    UpdateUserInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
    Address:
      type: object
      properties:
        id: { type: string, format: uuid }
        recipient: { type: string }
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        region: { type: string, nullable: true }
        postal_code: { type: string }
        country: { type: string, description: ISO 3166-1 alpha-2 country code., example: EG }
        phone: { type: string, nullable: true }
        is_default: { type: boolean }
      required: [id, recipient, line1, city, postal_code, country, is_default]
    AddressInput:
      type: object
      properties:
        recipient: { type: string }
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        region: { type: string, nullable: true }
        postal_code: { type: string }
        country: { type: string, example: EG }
        phone: { type: string, nullable: true }
        is_default: { type: boolean, default: false }
      required: [recipient, line1, city, postal_code, country]

    # --- Seller ---
    SellerApplicationInput:
      type: object
      properties:
        store_name: { type: string, minLength: 1 }
        description: { type: string }
        contact: { type: string, description: Public contact email or phone. }
      required: [store_name, contact]
    SellerApplication:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/SellerStatus' }
        store_name: { type: string }
        description: { type: string, nullable: true }
        contact: { type: string }
        created_at: { type: string, format: date-time }
      required: [id, user_id, status, store_name, contact, created_at]
    Store:
      type: object
      properties:
        id: { type: string, format: uuid }
        seller_id: { type: string, format: uuid }
        name: { type: string }
        logo_url: { type: string, format: uri, nullable: true }
        description: { type: string, nullable: true }
        contact: { type: string }
      required: [id, seller_id, name, contact]
    StoreInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        logo_url: { type: string, format: uri, nullable: true }
        description: { type: string, nullable: true }
        contact: { type: string }

    # --- Catalog ---
    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string, format: uuid, nullable: true }
      required: [id, name, slug]
    CategoryInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        parent_id: { type: string, format: uuid, nullable: true }
      required: [name]
    ProductImage:
      type: object
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        position: { type: integer }
      required: [id, url, position]
    Variant:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        color: { type: string, nullable: true }
        size: { type: string, nullable: true }
        sku: { type: string }
        price_minor: { type: integer, format: int64, minimum: 0 }
        stock: { type: integer, minimum: 0 }
      required: [id, product_id, sku, price_minor, stock]
    VariantInput:
      type: object
      properties:
        color: { type: string, nullable: true }
        size: { type: string, nullable: true }
        sku: { type: string }
        price_minor: { type: integer, format: int64, minimum: 0 }
        stock: { type: integer, minimum: 0 }
      required: [sku, price_minor, stock]
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        seller_id: { type: string, format: uuid }
        category_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/ProductStatus' }
        base_price_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, example: EGP }
        has_variants: { type: boolean }
        stock:
          type: integer
          minimum: 0
          nullable: true
          description: Stock for variant-less products; null when the product has variants.
        images:
          type: array
          items: { $ref: '#/components/schemas/ProductImage' }
        variants:
          type: array
          items: { $ref: '#/components/schemas/Variant' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, seller_id, category_id, title, status, base_price_minor, currency, has_variants, created_at]
    ProductInput:
      type: object
      properties:
        category_id: { type: string, format: uuid }
        title: { type: string, minLength: 1 }
        description: { type: string }
        base_price_minor: { type: integer, format: int64, minimum: 0 }
        currency: { type: string, example: EGP }
        status: { $ref: '#/components/schemas/ProductStatus' }
        stock:
          type: integer
          minimum: 0
          nullable: true
          description: Required for variant-less products; omit when managing via variants.
      required: [category_id, title, base_price_minor, currency]
    ProductListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        seller_id: { type: string, format: uuid }
        title: { type: string }
        base_price_minor: { type: integer, format: int64 }
        currency: { type: string, example: EGP }
        primary_image_url: { type: string, format: uri, nullable: true }
        status: { $ref: '#/components/schemas/ProductStatus' }
      required: [id, seller_id, title, base_price_minor, currency, status]

    # --- Cart ---
    Cart:
      type: object
      properties:
        id: { type: string, format: uuid }
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
        item_count: { type: integer }
        subtotal_minor: { type: integer, format: int64 }
        currency: { type: string, example: EGP }
      required: [id, items, item_count, subtotal_minor, currency]
    CartItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        variant_id: { type: string, format: uuid, nullable: true }
        seller_id: { type: string, format: uuid }
        title: { type: string }
        color: { type: string, nullable: true }
        size: { type: string, nullable: true }
        qty: { type: integer, minimum: 1 }
        unit_price_minor: { type: integer, format: int64 }
        line_total_minor: { type: integer, format: int64 }
      required: [id, product_id, seller_id, title, qty, unit_price_minor, line_total_minor]
    AddCartItemInput:
      type: object
      properties:
        product_id: { type: string, format: uuid }
        variant_id: { type: string, format: uuid, nullable: true }
        qty: { type: integer, minimum: 1, default: 1 }
      required: [product_id, qty]
    UpdateCartItemInput:
      type: object
      properties:
        qty: { type: integer, minimum: 1 }
      required: [qty]

    # --- Orders ---
    CheckoutRequest:
      type: object
      properties:
        address_id: { type: string, format: uuid }
      required: [address_id]
    PaymentIntentInfo:
      type: object
      properties:
        payment_intent_id: { type: string }
        client_secret: { type: string }
        amount_minor: { type: integer, format: int64 }
        currency: { type: string, example: EGP }
        status: { $ref: '#/components/schemas/PaymentStatus' }
      required: [payment_intent_id, client_secret, amount_minor, currency, status]
    CheckoutResponse:
      type: object
      properties:
        order: { $ref: '#/components/schemas/Order' }
        payment: { $ref: '#/components/schemas/PaymentIntentInfo' }
      required: [order, payment]
    OrderItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        variant_id: { type: string, format: uuid, nullable: true }
        title: { type: string }
        color: { type: string, nullable: true }
        size: { type: string, nullable: true }
        qty: { type: integer, minimum: 1 }
        unit_price_minor: { type: integer, format: int64 }
        line_total_minor: { type: integer, format: int64 }
      required: [id, product_id, title, qty, unit_price_minor, line_total_minor]
    SubOrder:
      type: object
      properties:
        id: { type: string, format: uuid }
        order_id: { type: string, format: uuid }
        seller_id: { type: string, format: uuid }
        store_name: { type: string }
        status: { $ref: '#/components/schemas/SubOrderStatus' }
        tracking_ref: { type: string, nullable: true }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        subtotal_minor: { type: integer, format: int64 }
        shipping_minor: { type: integer, format: int64 }
        total_minor: { type: integer, format: int64 }
        currency: { type: string, example: EGP }
      required: [id, order_id, seller_id, status, items, subtotal_minor, shipping_minor, total_minor, currency]
    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        buyer_id: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/OrderStatus' }
        shipping_address: { $ref: '#/components/schemas/Address' }
        suborders:
          type: array
          items: { $ref: '#/components/schemas/SubOrder' }
        total_minor: { type: integer, format: int64 }
        currency: { type: string, example: EGP }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, buyer_id, status, suborders, total_minor, currency, created_at]
    UpdateSubOrderInput:
      type: object
      properties:
        status:
          type: string
          enum: [processing, shipped, delivered]
        tracking_ref: { type: string, nullable: true }
      required: [status]

    # --- Reports ---
    SellerReportSummary:
      type: object
      properties:
        total_products: { type: integer }
        total_orders: { type: integer }
        succeeded_orders: { type: integer }
        total_sales_value_minor: { type: integer, format: int64 }
        earnings_minor: { type: integer, format: int64 }
        currency: { type: string, example: EGP }
        date_from: { type: string, format: date, nullable: true }
        date_to: { type: string, format: date, nullable: true }
      required: [total_products, total_orders, succeeded_orders, total_sales_value_minor, earnings_minor, currency]
    OrdersByStatus:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              status: { $ref: '#/components/schemas/SubOrderStatus' }
              count: { type: integer }
            required: [status, count]
      required: [data]
    PlatformMetrics:
      type: object
      properties:
        gmv_minor: { type: integer, format: int64, description: Gross merchandise value of succeeded orders. }
        currency: { type: string, example: EGP }
        total_orders: { type: integer }
        succeeded_orders: { type: integer }
        active_sellers: { type: integer }
        active_products: { type: integer }
      required: [gmv_minor, currency, total_orders, succeeded_orders, active_sellers, active_products]

    # --- System ---
    HealthStatus:
      type: object
      properties:
        status: { type: string, example: ok }
      required: [status]
