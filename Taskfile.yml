version: "3"

dotenv: [".env"]

vars:
  APP_BIN:
    sh: |
      if [ "$OS" = "Windows_NT" ]; then
        echo bin/api.exe
      else
        echo bin/api
      fi
  SQLC_DIRS: internal/platform/db/dbgen internal/platform/events/eventsdb internal/modules/identity/repo/identitydb internal/modules/seller/repo/sellerdb

tasks:
  default:
    cmds: [task --list]

  run:
    desc: Run the API locally
    cmds: [go run ./cmd/api]

  build:
    desc: Build the API binary
    cmds:
      - '{{if eq OS "windows"}}powershell -Command "New-Item -ItemType Directory -Force bin"{{else}}mkdir -p bin{{end}}'
      - go build -o {{.APP_BIN}} ./cmd/api

  test:
    desc: Run unit tests (no DB required)
    cmds: [go test ./... -count=1]

  lint:
    desc: Run golangci-lint (also checks formatting)
    cmds: [golangci-lint run]

  fmt:
    desc: Format the code
    cmds:
      - go fmt ./...

  tidy:
    desc: Tidy go.mod
    cmds: [go mod tidy]

  generate:
    desc: Run code generation
    cmds:
      - go generate ./...
      - sqlc generate

  clean:
    desc: Remove build artifacts
    cmds:
      - '{{if eq OS "windows"}}powershell -Command "Remove-Item -Recurse -Force bin -ErrorAction SilentlyContinue"{{else}}rm -rf bin{{end}}'

  ci:
    desc: Full pipeline
    cmds:
      - task tidy
      - task generate
      - task lint
      - task test
      - task build

  # --- database (P0) ---
  db:up:
    desc: Start Postgres
    cmds: [docker compose up -d db]

  db:down:
    desc: Stop Postgres and remove containers
    cmds: [docker compose down]

  # --- database & codegen (P1) ---
  migrate:new:
    desc: "Create a migration pair: task migrate:new -- <name>"
    cmds:
      - migrate create -ext sql -dir migrations -seq {{.CLI_ARGS}}

  migrate:up:
    desc: Apply all up migrations
    cmds:
      - migrate -path migrations -database "{{.DATABASE_URL}}" up

  migrate:down:
    desc: Roll back the last migration
    cmds:
      - migrate -path migrations -database "{{.DATABASE_URL}}" down 1

  migrate:version:
    desc: Print the current migration version
    cmds:
      - migrate -path migrations -database "{{.DATABASE_URL}}" version

  migrate:force:
    desc: "Force a version (clear a dirty state): task migrate:force -- <version>"
    cmds:
      - migrate -path migrations -database "{{.DATABASE_URL}}" force {{.CLI_ARGS}}

  sqlc:check:
    desc: Fail if generated code is stale
    cmds:
      - sqlc generate
      - git diff --exit-code -- {{.SQLC_DIRS}}

  test:integration:
    desc: Run DB-backed integration tests
    deps:
      - db:up
      - migrate:up
    cmds:
      # -p 1: integration packages share one Postgres instance and some TRUNCATE shared tables
      # (e.g. identity_users), so package test binaries must not run concurrently (P5).
      - go test -tags integration -p 1 ./... -count=1

  tools:
    desc: Install dev tools
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
