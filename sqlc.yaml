version: "2"
sql:
  - engine: postgresql
    schema: "migrations/*.up.sql"
    queries: "internal/platform/db/queries"
    gen:
      go:
        package: "dbgen"
        out: "internal/platform/db/dbgen"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
  - engine: postgresql
    schema: "migrations/*.up.sql"
    queries: "internal/platform/events/queries"
    gen:
      go:
        package: "eventsdb"
        out: "internal/platform/events/eventsdb"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
  - engine: postgresql
    schema: "migrations/*.up.sql"
    queries: "internal/modules/identity/repo/queries"
    gen:
      go:
        package: "identitydb"
        out: "internal/modules/identity/repo/identitydb"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
  - engine: postgresql
    schema: "migrations/*.up.sql"
    queries: "internal/modules/seller/repo/queries"
    gen:
      go:
        package: "sellerdb"
        out: "internal/modules/seller/repo/sellerdb"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
